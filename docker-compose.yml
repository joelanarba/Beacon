services:

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: beacon-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - beacon-net
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: beacon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beacon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beacon}
      POSTGRES_DB: ${POSTGRES_DB:-beacon}
    volumes:
      - beacon-pg:/var/lib/postgresql/data
    networks:
      - beacon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beacon}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: beacon-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - beacon-redis:/data
    networks:
      - beacon-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: beacon-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-beacon}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-beacon}
    volumes:
      - beacon-rabbitmq:/var/lib/rabbitmq
    networks:
      - beacon-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: beacon-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - beacon-prom:/prometheus
    networks:
      - beacon-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: beacon-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - beacon-grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - beacon-net

networks:
  beacon-net:
    driver: bridge

volumes:
  beacon-pg:
  beacon-redis:
  beacon-rabbitmq:
  beacon-prom:
  beacon-grafana:
